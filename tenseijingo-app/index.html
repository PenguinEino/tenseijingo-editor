<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天声人語エディタ</title>
<link rel="stylesheet" href="/src/styles.css" />
<script type="module" src="/src/main.ts" defer></script>
</head>
<body>

<!-- 初回セットアップ画面 -->
<div id="setup-screen" style="display:none;">
  <div id="setup-box">
    <h1>天声人語エディタ</h1>
    <p class="setup-desc">原稿の保存先フォルダを選んでください。</p>
    <div id="setup-path-display"></div>
    <div id="setup-actions">
      <button id="setup-default" class="primary-btn">デフォルトの場所を使う</button>
      <button id="setup-choose">フォルダを選択…</button>
    </div>
  </div>
</div>

<!-- ファイル管理画面 -->
<div id="file-manager" style="display:none;">
  <div id="fm-header">
    <div id="fm-header-inner">
      <h1>天声人語エディタ</h1>
      <div id="fm-actions">
        <button id="fm-new">＋ 新規作成</button>
        <button id="fm-import">読込</button>
        <input type="file" id="fm-file-input" accept=".txt" style="display:none">
      </div>
    </div>
    <div id="fm-datadir-bar">
      <span id="fm-datadir-label">保存先:</span>
      <span id="fm-datadir-path"></span>
      <button id="fm-datadir-change">変更</button>
    </div>
  </div>
  <div id="fm-list-wrapper">
    <div id="fm-list"></div>
  </div>
</div>

<!-- エディタ画面 -->
<div id="editor-screen" style="display:none;">
  <div id="toolbar">
    <div class="tb-left">
      <button id="btn-back" title="ファイル一覧に戻る">◁ 一覧</button>
    </div>
    <div class="tb-center">
      <span id="editor-title">無題</span>
      <span id="save-status"></span>
    </div>
    <div class="tb-right">
      <button id="btn-save" title="Ctrl+S / ⌘S">保存</button>
      <button id="btn-rename">名前変更</button>
      <button id="btn-export">書出</button>
      <button id="btn-preview">表示</button>
      <button id="btn-history">履歴</button>
      <button id="btn-settings" title="設定" style="cursor:pointer; border:none; background:transparent; font-size:15px; padding:0 4px; vertical-align:middle;">⚙️</button>
      <span class="tb-divider"></span>
      <label class="tb-check"><input type="checkbox" id="chk-grid" checked> 罫線</label>
    </div>
  </div>

  <div id="editor-body">
    <div id="grid-wrapper">
      <div id="grid"></div>
    </div>
    <div id="preview-panel" style="display:none;">
      <div id="preview-header">
        <span id="preview-title"></span>
        <div id="preview-header-actions">
          <label class="tb-check" style="margin-right: 8px;"><input type="checkbox" id="chk-preview-space"> 空白を挿入</label>
          <button id="btn-preview-copy">コピー</button>
          <button id="btn-preview-close">✕</button>
        </div>
      </div>
      <textarea id="preview-text" readonly></textarea>
    </div>
  </div>

  <div id="status-bar">
    <span id="status-text">0 / 602 文字</span>
  </div>
</div>

<textarea id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" wrap="off"></textarea>

<!-- カスタムダイアログ -->
<div id="modal-overlay" style="display:none;">
  <div id="modal-box">
    <div id="modal-message"></div>
    <input type="text" id="modal-input" style="display:none;" />
    <div id="modal-buttons">
      <button id="modal-cancel">キャンセル</button>
      <button id="modal-ok">OK</button>
    </div>
  </div>
</div>

<!-- 履歴モーダル -->
<div id="history-overlay" style="display:none;">
  <div id="history-box">
    <div id="history-header">
      <span id="history-title">版履歴</span>
      <button id="history-close">✕</button>
    </div>
    <div id="history-body">
      <div id="history-list-wrapper">
        <div id="history-list"></div>
      </div>
      <div id="history-preview-wrapper" style="display:none;">
        <div id="history-preview-header">
          <span id="history-preview-info"></span>
          <div id="history-preview-actions">
            <button id="history-restore">この版を復元</button>
            <button id="history-preview-back">戻る</button>
          </div>
        </div>
        <textarea id="history-preview-text" readonly></textarea>
      </div>
    </div>
  </div>
</div>

<!-- 設定モーダル -->
<div id="settings-overlay" style="display:none;">
  <div id="settings-box">
    <div id="settings-header">
      <span id="settings-title">設定</span>
      <button id="settings-close">✕</button>
    </div>
    <div id="settings-body">
      <div class="setting-group">
        <label class="setting-label">プレビュー時の空白挿入文字</label>
        <div class="setting-controls">
          <label><input type="radio" name="setting-space" value="half"> 半角スペース</label>
          <label style="margin-left:14px;"><input type="radio" name="setting-space" value="full"> 全角スペース</label>
        </div>
      </div>
      <div class="setting-group">
        <label class="setting-label">行頭禁則文字</label>
        <input type="text" id="setting-kinsoku-head" class="setting-input">
      </div>
      <div class="setting-group">
        <label class="setting-label">行末禁則文字</label>
        <input type="text" id="setting-kinsoku-tail" class="setting-input">
      </div>
      <div class="setting-group">
        <label class="setting-label">禁則マスの強調色</label>
        <div style="display:flex; align-items:center; gap:8px;">
          <input type="color" id="setting-kinsoku-color">
        </div>
      </div>
    </div>
    <div id="settings-footer">
      <button class="primary-btn" id="btn-settings-save">保存</button>
    </div>
  </div>
</div>

</body>
</html>

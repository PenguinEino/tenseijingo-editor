<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天声人語エディタ</title>
<link rel="stylesheet" href="/src/styles.css" />
<script type="module" src="/src/main.ts" defer></script>
</head>
<body>

<!-- 初回セットアップ画面 -->
<div id="setup-screen" style="display:none;">
  <div id="setup-box">
    <h1>天声人語エディタ</h1>
    <p class="setup-desc">原稿の保存先フォルダを選んでください。</p>
    <div id="setup-path-display"></div>
    <div id="setup-actions">
      <button id="setup-default" class="primary-btn">デフォルトの場所を使う</button>
      <button id="setup-choose">フォルダを選択…</button>
    </div>
  </div>
</div>

<!-- ファイル管理画面 -->
<div id="file-manager" style="display:none;">
  <div id="fm-header">
    <div id="fm-header-inner">
      <h1>天声人語エディタ</h1>
      <div id="fm-actions">
        <button id="fm-new">＋ 新規作成</button>
        <button id="fm-import">読込</button>
        <input type="file" id="fm-file-input" accept=".txt" style="display:none">
      </div>
    </div>
    <div id="fm-datadir-bar">
      <span id="fm-datadir-label">保存先:</span>
      <span id="fm-datadir-path"></span>
      <button id="fm-datadir-change">変更</button>
    </div>
  </div>
  <div id="fm-list-wrapper">
    <div id="fm-list"></div>
  </div>
</div>

<!-- エディタ画面 -->
<div id="editor-screen" style="display:none;">
  <div id="toolbar">
    <div class="toolbar-main">
      <div class="tb-left">
        <button id="btn-back" title="ファイル一覧に戻る">◁ 一覧</button>
      </div>
      <div class="tb-center">
        <span id="editor-title">無題</span>
        <span id="save-status"></span>
      </div>
      <div class="tb-right">
        <button id="btn-save" title="Ctrl+S / ⌘S">保存</button>
        <button id="btn-rename">名前変更</button>
        <button id="btn-export">書出</button>
        <button id="btn-preview">プレビュー</button>
        <button id="btn-history">履歴</button>
        <button id="btn-settings" title="設定" style="cursor:pointer; border:none; background:transparent; font-size:15px; padding:0 4px; vertical-align:middle;">⚙️</button>
      </div>
    </div>
    <div class="toolbar-inline" aria-label="表示調整">
      <div class="inline-group">
        <span class="inline-label">表示倍率</span>
        <button id="btn-zoom-smaller" class="tb-inline-btn" title="表示を少し小さくする">-</button>
        <span id="view-zoom-value" class="inline-value">100%</span>
        <button id="btn-zoom-larger" class="tb-inline-btn" title="表示を少し大きくする">+</button>
      </div>
      <span class="tb-divider"></span>
      <div class="inline-group">
        <span class="inline-label">文字サイズ</span>
        <button id="btn-font-smaller" class="tb-inline-btn" title="文字サイズを下げる">A-</button>
        <span id="font-size-value" class="inline-value">100%</span>
        <button id="btn-font-larger" class="tb-inline-btn" title="文字サイズを上げる">A+</button>
      </div>
      <span class="tb-divider"></span>
      <div class="inline-group">
        <span class="inline-label">文字太さ</span>
        <button id="btn-weight-lighter" class="tb-inline-btn" title="文字を細くする">-</button>
        <span id="font-weight-value" class="inline-value">500</span>
        <button id="btn-weight-heavier" class="tb-inline-btn" title="文字を太くする">+</button>
      </div>
      <span class="tb-divider"></span>
      <div class="inline-group">
        <span class="inline-label">罫線</span>
        <button id="btn-grid-solid" class="tb-inline-btn" title="実線">実線</button>
        <button id="btn-grid-dashed" class="tb-inline-btn" title="点線">点線</button>
      </div>
    </div>
  </div>

  <div id="editor-body">
    <div id="grid-wrapper">
      <div id="grid"></div>
    </div>
    <div id="preview-panel" style="display:none;">
      <div id="preview-header">
        <span id="preview-title"></span>
        <div id="preview-header-actions">
          <button id="btn-preview-copy">コピー</button>
          <button id="btn-preview-close">✕</button>
        </div>
      </div>
      <textarea id="preview-text" readonly></textarea>
    </div>
  </div>

  <div id="status-bar">
    <span id="status-text">0 / 602 文字</span>
  </div>
</div>

<textarea id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" wrap="off"></textarea>

<!-- カスタムダイアログ -->
<div id="modal-overlay" style="display:none;">
  <div id="modal-box">
    <div id="modal-message"></div>
    <input type="text" id="modal-input" style="display:none;" />
    <div id="modal-buttons">
      <button id="modal-cancel">キャンセル</button>
      <button id="modal-ok">OK</button>
    </div>
  </div>
</div>

<div id="data-dir-overlay" style="display:none;">
  <div id="data-dir-box">
    <div id="data-dir-header">
      <span id="data-dir-title">保存先を変更</span>
      <button id="data-dir-close">✕</button>
    </div>
    <div id="data-dir-body">
      <p id="data-dir-lead">切替先と原稿の扱いを選んでください。</p>
      <div class="data-dir-path-group">
        <div class="data-dir-path-card">
          <span class="data-dir-path-label">現在の保存先</span>
          <span id="data-dir-current" class="data-dir-path-value"></span>
        </div>
        <div class="data-dir-path-card">
          <span class="data-dir-path-label">新しい保存先</span>
          <span id="data-dir-next" class="data-dir-path-value"></span>
        </div>
      </div>
      <div id="data-dir-summary"></div>
      <div id="data-dir-warnings"></div>
      <div id="data-dir-actions">
        <button id="data-dir-migrate" class="data-dir-option" type="button" aria-pressed="false">
          <span class="data-dir-option-title">原稿も引き継いで切り替える</span>
          <span class="data-dir-option-desc">今の保存先の原稿を新しい保存先へコピーしてから切り替えます。</span>
        </button>
        <button id="data-dir-switch-only" class="data-dir-option" type="button" aria-pressed="false">
          <span class="data-dir-option-title">保存先だけ切り替える</span>
          <span class="data-dir-option-desc">新しい保存先にある原稿をそのまま使います。今の原稿は元の保存先に残ります。</span>
        </button>
      </div>
    </div>
    <div id="data-dir-footer">
      <button id="data-dir-cancel" type="button">キャンセル</button>
      <button id="data-dir-confirm" class="primary-btn" type="button" disabled>この内容で切り替える</button>
    </div>
  </div>
</div>

<!-- 履歴モーダル -->
<div id="history-overlay" style="display:none;">
  <div id="history-box">
    <div id="history-header">
      <span id="history-title">版履歴</span>
      <button id="history-close">✕</button>
    </div>
    <div id="history-body">
      <div id="history-list-wrapper">
        <div id="history-list"></div>
      </div>
      <div id="history-preview-wrapper" style="display:none;">
        <div id="history-preview-header">
          <span id="history-preview-info"></span>
          <div id="history-preview-actions">
            <button id="history-restore">この版を復元</button>
            <button id="history-preview-back">戻る</button>
          </div>
        </div>
        <textarea id="history-preview-text" readonly></textarea>
      </div>
    </div>
  </div>
</div>

<!-- 設定モーダル -->
<div id="settings-overlay" style="display:none;">
  <div id="settings-box">
    <div id="settings-header">
      <span id="settings-title">設定</span>
      <button id="settings-close">✕</button>
    </div>
    <div id="settings-body">
      <div class="setting-group">
        <label class="setting-label">行頭禁則文字</label>
        <input type="text" id="setting-kinsoku-head" class="setting-input">
      </div>
      <div class="setting-group">
        <label class="setting-label">行末禁則文字</label>
        <input type="text" id="setting-kinsoku-tail" class="setting-input">
      </div>
      <div class="setting-group">
        <label class="setting-label">禁則マスの強調色</label>
        <div style="display:flex; align-items:center; gap:8px;">
          <input type="color" id="setting-kinsoku-color">
        </div>
      </div>
      <div class="setting-group">
        <label class="setting-label" for="setting-tcy-scale">連数字の大きさ補正</label>
        <div class="setting-inline-row">
          <input type="range" id="setting-tcy-scale" min="96" max="110" step="1">
          <span id="setting-tcy-scale-value" class="setting-inline-value">104%</span>
        </div>
      </div>
      <div class="setting-group">
        <label class="setting-label">カーソル位置</label>
        <div class="settings-preview-switch">
          <button type="button" id="setting-cursor-top" class="settings-preview-btn active">上</button>
          <button type="button" id="setting-cursor-bottom" class="settings-preview-btn">下</button>
          <button type="button" id="setting-cursor-left" class="settings-preview-btn">左</button>
          <button type="button" id="setting-cursor-right" class="settings-preview-btn">右</button>
        </div>
      </div>
      <div class="setting-group">
        <label class="setting-label">表示プレビュー</label>
        <div class="settings-preview-panel">
          <div class="settings-preview-switch">
            <button type="button" id="settings-preview-char" class="settings-preview-btn active">通常文字</button>
            <button type="button" id="settings-preview-tcy" class="settings-preview-btn">99</button>
          </div>
          <div class="settings-preview-stage">
            <div id="settings-preview-cell" class="settings-preview-cell">
              <span id="settings-preview-glyph" class="settings-preview-glyph">縦</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="settings-footer">
      <button class="primary-btn" id="btn-settings-save">保存</button>
    </div>
  </div>
</div>

</body>
</html>

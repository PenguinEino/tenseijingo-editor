name: 'Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            portable: false
          - platform: windows-latest
            portable: true
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tenseijingo-app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tenseijingo-app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: tenseijingo-app/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('tenseijingo-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        working-directory: ./tenseijingo-app
        run: npm install

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./tenseijingo-app
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: 'Release v__VERSION__'
          releaseDraft: false
          prerelease: false

      - name: Create portable zip (Windows)
        if: matrix.portable
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $exePath = "tenseijingo-app/src-tauri/target/release/tenseijingo-app.exe"
          $zipName = "tenseijingo-editor_${version}_x64_portable.zip"
          Compress-Archive -Path $exePath -DestinationPath $zipName

      - name: Upload portable zip to release (Windows)
        if: matrix.portable
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $zipName = "tenseijingo-editor_${version}_x64_portable.zip"
          gh release upload ${{ github.ref_name }} $zipName --clobber

name: 'Release'

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            portable: false
            tauriArgs: '--bundles app'
          - platform: windows-latest
            portable: true
            tauriArgs: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tenseijingo-app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tenseijingo-app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: tenseijingo-app/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('tenseijingo-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        working-directory: ./tenseijingo-app
        run: npm install

      # タグpush時: ビルド＋リリース作成
      - name: Build and release
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./tenseijingo-app
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: 'Release v__VERSION__'
          releaseDraft: false
          prerelease: false
          releaseAssetNamePattern: 'tenseijingo-editor_[version]_[platform]_[arch][setup][ext]'
          args: ${{ matrix.tauriArgs }}

      # mainブランチpush時: ビルドのみ（キャッシュを温める）
      - name: Build (cache warm)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./tenseijingo-app
          args: ${{ matrix.tauriArgs }}

      - name: Create portable zip (Windows)
        if: matrix.portable && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $exePath = "tenseijingo-app/src-tauri/target/release/tenseijingo-app.exe"
          $zipName = "tenseijingo-editor_${version}_x64_portable.zip"
          Compress-Archive -Path $exePath -DestinationPath $zipName

      - name: Upload portable zip to release (Windows)
        if: matrix.portable && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $zipName = "tenseijingo-editor_${version}_x64_portable.zip"
          gh release upload ${{ github.ref_name }} $zipName --clobber
